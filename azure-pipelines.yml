trigger:
- main

pool:
  vmImage: 'windows-latest' # Windows é obrigatório para compilar MAUI e ferramentas do .NET 10

variables:
  buildConfiguration: 'Release'

stages:
# ==========================================
# STAGE 1: Build e Publicação da API (.NET 8)
# ==========================================
- stage: BuildAPI
  displayName: 'Build da API .NET 8'
  jobs:
  - job: CompilarAPI
    displayName: 'Compilar e Publicar API'
    steps:
    - task: UseDotNet@2
      displayName: 'Instalar SDK .NET 8.0'
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - script: dotnet restore Api8-Mobile-Mysql/Api8-Mobile-Mysql.csproj
      displayName: 'Restaurar dependências da API'

    - script: dotnet build Api8-Mobile-Mysql/Api8-Mobile-Mysql.csproj --configuration $(buildConfiguration) --no-restore
      displayName: 'Compilar API'

    - task: DotNetCoreCLI@2
      displayName: 'Publicar API'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'Api8-Mobile-Mysql/Api8-Mobile-Mysql.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api-artifact'
        zipAfterPublish: true

    - publish: $(Build.ArtifactStagingDirectory)/api-artifact
      artifact: 'drop-api'
      displayName: 'Publicar Artefato: API'

# ==========================================
# STAGE 2: Build e Publicação do App MAUI (.NET 10)
# ==========================================
- stage: BuildMobile
  displayName: 'Build do Mobile .NET 10'
  dependsOn: [] # Executa em paralelo com a API para economizar tempo
  jobs:
  - job: CompilarMaui
    displayName: 'Compilar e Publicar App MAUI'
    steps:
    - task: UseDotNet@2
      displayName: 'Instalar SDK .NET 10.0'
      inputs:
        packageType: 'sdk'
        version: '10.0.x'
        includePreviewVersions: true # Importante se o .NET 10 ainda estiver em ciclo de preview/RC no seu ambiente

    - script: dotnet workload install maui
      displayName: 'Instalar Workload MAUI (.NET 10)'

    - script: dotnet workload restore Mobile-Maui-Login-Pessoa/Mobile-Maui-Login-Pessoa.csproj
      displayName: 'Restaurar Workloads do Projeto'

    - script: dotnet restore Mobile-Maui-Login-Pessoa/Mobile-Maui-Login-Pessoa.csproj
      displayName: 'Restaurar Pacotes NuGet do Mobile'

    - script: dotnet build Mobile-Maui-Login-Pessoa/Mobile-Maui-Login-Pessoa.csproj --configuration $(buildConfiguration) -f net10.0-android --no-restore
      displayName: 'Compilar MAUI (Android net10.0)'

    - task: CopyFiles@2
      displayName: 'Separar Pacotes Compilados (APK)'
      inputs:
        SourceFolder: 'Mobile-Maui-Login-Pessoa/bin/$(buildConfiguration)/net10.0-android'
        Contents: '**/*.apk'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/mobile-artifact'

    - publish: $(Build.ArtifactStagingDirectory)/mobile-artifact
      artifact: 'drop-mobile'
      displayName: 'Publicar Artefato: Mobile'
