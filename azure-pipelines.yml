trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

stages:
# ==========================================
# STAGE 1: Build e Publicação da API (.NET 8)
# ==========================================
- stage: BuildAPI
  displayName: 'Build da API .NET 8'
  jobs:
  - job: CompilarAPI
    displayName: 'Compilar e Publicar API'
    steps:
    - task: UseDotNet@2
      displayName: 'Instalar SDK .NET 8.0'
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restaurar dependências da API'
      inputs:
        command: 'restore'
        projects: 'Api8-Mobile-Mysql/**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Compilar API'
      inputs:
        command: 'build'
        projects: 'Api8-Mobile-Mysql/**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Publicar API'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'Api8-Mobile-Mysql/**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api-artifact --no-restore'
        zipAfterPublish: true

    - publish: $(Build.ArtifactStagingDirectory)/api-artifact
      artifact: 'drop-api'
      displayName: 'Publicar Artefato: API'

# ==========================================
# STAGE 2: Build e Publicação do App MAUI (.NET 10)
# ==========================================
- stage: BuildMobile
  displayName: 'Build do Mobile .NET 10'
  dependsOn: [] 
  jobs:
  - job: CompilarMaui
    displayName: 'Compilar e Publicar App MAUI'
    steps:
    - task: UseDotNet@2
      displayName: 'Instalar SDK .NET 10.0'
      inputs:
        packageType: 'sdk'
        version: '10.0.x'
        includePreviewVersions: true 

    - script: dotnet workload install maui
      displayName: 'Instalar Workload MAUI (.NET 10)'

    # Apontando para a pasta raiz correta do mobile
    - script: dotnet workload restore
      workingDirectory: 'Mobile-Maui-Login-Pessoa'
      displayName: 'Restaurar Workloads do Projeto'

    - task: DotNetCoreCLI@2
      displayName: 'Restaurar Pacotes NuGet do Mobile'
      inputs:
        command: 'restore'
        projects: 'Mobile-Maui-Login-Pessoa/**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Compilar MAUI (Android net10.0)'
      inputs:
        command: 'build'
        projects: 'Mobile-Maui-Login-Pessoa/**/*.csproj'
        arguments: '--configuration $(buildConfiguration) -f net10.0-android --no-restore'

    # Correção: Caminho atualizado adicionando a subpasta '/AppMobile/' detectada nos logs
    - task: CopyFiles@2
      displayName: 'Separar Pacotes Compilados (APK)'
      inputs:
        SourceFolder: 'Mobile-Maui-Login-Pessoa/AppMobile/bin/$(buildConfiguration)/net10.0-android'
        Contents: '**/*.apk'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/mobile-artifact'

    - publish: $(Build.ArtifactStagingDirectory)/mobile-artifact
      artifact: 'drop-mobile'
      displayName: 'Publicar Artefato: Mobile'
